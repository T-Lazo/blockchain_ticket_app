<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Wallet</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.9.0/dist/web3.min.js"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <nav>
        <a href="../index.html" class="nav-logo"><span class="nav-logo-icon"><img src="../images/Blicket.png" alt="" width="20" height="20"></span>Blicket</a>
        <a href="wallet.html" class="nav-active">Wallet</a>
        <a href="buy.html">Buy</a>
        <a href="transfer.html">Return</a>
        <a href="doorman.html">Verify</a>
    </nav>

    <div class="container">
        <h1>Create a Wallet</h1>

        <div class="card">
            <input type="password" id="password" placeholder="Enter a password for your wallet">
            <button onclick="createWallet()">Create Wallet</button>
        </div>

        <div class="card" id="walletDetails" style="display:none">
            <label>Wallet Address:</label>
            <textarea id="walletAddress" rows="2" readonly></textarea>

            <label>Private Key:</label>
            <textarea id="privateKey" rows="2" readonly></textarea>

            <label>Keystore File:</label>
            <textarea id="keystore" rows="6" readonly></textarea>

            <button onclick="downloadKeystore()">Download Keystore</button>
        </div>

        <div id="status"></div>
    </div>

    <script src="../js/contract.js"></script>
    <script src="../js/wallet.js"></script>
</body>

</html>
